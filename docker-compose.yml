# docker-compose.yml
services:
  postgres:
    image: postgres:16
    container_name: sql_aprendizaje_db
    environment:
      POSTGRES_USER: alumno
      POSTGRES_PASSWORD: alumno123
      POSTGRES_DB: ecommerce
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: